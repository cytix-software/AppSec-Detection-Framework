events {}

http {
  # Shared cache on disk (inside container)
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=test112cache:10m
                   max_size=100m inactive=10m use_temp_path=off;

  server {
    listen 80;

    location / {
      proxy_pass http://test_112_v1_backend:80;

      # Basic proxy headers
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;

      #Shared caching
      proxy_cache test112cache;
      proxy_cache_valid 200 10m;

      add_header X-Cache-Status $upstream_cache_status always;
    }
  }
}