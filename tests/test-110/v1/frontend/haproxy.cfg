global
    maxconn 1000
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option http-keep-alive
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend fe_http
    bind *:80

    # block direct access to the secret endpoint
    acl is_products_php path -i /products.php
    acl has_secret_param urlp(secret) -m found
    http-request deny status 403 if is_products_php has_secret_param

    default_backend be_app

backend be_app
    http-response del-header server
    server app test_110_v1_backend:8080 check
