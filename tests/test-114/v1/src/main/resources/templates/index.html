<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>XML Test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; }
    textarea { width: 100%; height: 260px; font-family: monospace; }
    pre { padding: 10px; border: 1px solid #ddd; overflow: auto; white-space: pre-wrap; }
    button { padding: 10px 16px; cursor: pointer; }
    .row { margin-top: 12px; }
  </style>
</head>
<body>
  <h1>XML Test</h1>
  <p>This submits raw XML to <code>/parse-xml</code> with <code>Content-Type: application/xml</code>.</p>

  <form id="f">
    <label for="xml"><b>XML Input</b></label>
    <textarea id="xml" name="xml"></textarea>

    <div class="row">
      <button type="submit">Parse XML</button>
    </div>
  </form>

  <div class="row">
    <b>Response:</b>
    <pre id="out">(none)</pre>
  </div>

  <script>
    const form = document.getElementById("f");
    const xmlEl = document.getElementById("xml");
    const out = document.getElementById("out");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      out.textContent = "Sending...";

      const xml = xmlEl.value;

      const res = await fetch("/parse-xml", {
        method: "POST",
        headers: { "Content-Type": "application/xml" },
        body: xml
      });

      const text = await res.text();
      out.textContent = `HTTP ${res.status}\n\n` + text;
    });
  </script>
</body>
</html>
