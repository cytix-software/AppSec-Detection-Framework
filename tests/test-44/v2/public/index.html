<!DOCTYPE html>
<html ng-app="App">
<head>
    <title>DOM XSS Test</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.2.32/angular.min.js"></script>
</head>
<body>
    <div ng-controller="Controller">
        <input type="text" ng-model="searchQuery" placeholder="Enter payload">
        <button ng-click="search()">Search</button>
        <div ng-bind-html="searchResults"></div>
    </div>

    <script>
    angular.module('App', [])
      .config(['$sceProvider', function($sceProvider) {
        $sceProvider.enabled(false);
      }])
      .controller('Controller', ['$scope', '$http', function($scope, $http) {
        $scope.searchQuery = '';
        $scope.searchResults = '';

        $scope.search = function() {
          $http.get('/api/search', { params: { text: $scope.searchQuery } })
            .then(function(resp) {
                console.log(resp);
              $scope.searchResults = resp.data; // if API returns plain text via res.send(query)
            }, function() {
              $scope.searchResults = 'Error';
            });
        };
      }]);
  </script>
</body>
</html>
